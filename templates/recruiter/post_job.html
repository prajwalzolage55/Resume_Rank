{% extends "base.html" %}
{% block page_title %}Post a Job | ResumeRank{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px;">
    <div class="page-header animate-fade-up flex justify-between items-center">
        <div>
            <h2>Post a New Job</h2>
            <p class="text-secondary">Define requirements to find semantic matches.</p>
        </div>
        <a href="{{ url_for('recruiter.dashboard') }}" class="btn btn-ghost">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>
    </div>

    <div class="card animate-fade-up delay-100">
        <form method="POST" action="{{ url_for('recruiter.post_job') }}">
            <div class="form-group">
                <label for="title" class="form-label">Job Title</label>
                <input type="text" id="title" name="title" class="form-control" required placeholder="e.g. Senior Backend Engineer">
            </div>
            
            <div class="form-group">
                <label for="skills_required" class="form-label">Required Skills (comma separated)</label>
                <input type="text" id="skills_required" name="skills_required" class="form-control" required placeholder="e.g. Python, AWS, Docker, PostgreSQL">
                <div class="text-sm text-muted" style="margin-top: 0.5rem;">
                    <i class="fa-solid fa-circle-info"></i> Used for AI vector matching against candidate resumes.
                </div>
            </div>
            
            <div class="form-group">
                <label for="description" class="form-label">Job Description</label>
                <textarea id="description" name="description" class="form-control" rows="10" required placeholder="Describe the role, responsibilities, and team..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem; font-size: 1rem;">
                Publish & Match Candidates
            </button>
        </form>
    </div>
</div>
{% endblock %}
